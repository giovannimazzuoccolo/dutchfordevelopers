name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NPM_CONFIG_LEGACY_PEER_DEPS: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node and install
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests 🧪
        run: npm run test
