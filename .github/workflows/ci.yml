name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check
        run: echo "CI is alive"

      - name: Install dependencies
        run: |
          rm -f ~/.npmrc
          npm config set registry https://registry.npmjs.org
          npm config delete //registry.npmjs.org/:_authToken || true
          npm config delete //npm.pkg.github.com/:_authToken || true
          npm config delete //registry.npmjs.org/:username || true
          npm config delete //registry.npmjs.org/:_password || true
          npm config delete //registry.npmjs.org/:email || true
          npm config delete always-auth || true
          npm config list
          npm ci

      - name: Run tests 🧪
        run: npm run test
