name: ci

on:
    push:
        branches:
            - main
            - master
    pull_request:
        branches:
            - main
            - master

jobs:
    ci:
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [ubuntu-latest]
                node: [24]  # Upgraded from 14 to 24 (LTS)

        steps:
            - name: Checkout 🛎
              uses: actions/checkout@v4  # Upgraded from @master

            - name: Setup node env 🏗
              uses: actions/setup-node@v5  # Upgraded from v2.1.5
              with:
                  node-version: ${{ matrix.node }}
                  check-latest: true
                  registry-url: https://registry.npmjs.org/

            - name: Install dependencies 👨🏻‍💻
              run: |
                  npm config set registry https://registry.npmjs.org/
                  npm ci --prefer-offline --no-audit

            - name: Run linter 👀
              run: npm run lint

            - name: Run tests 🧪
              run: npm run test