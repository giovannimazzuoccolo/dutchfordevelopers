name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: NPM debug
        run: |
          node -v
          npm -v
          npm config get registry
          npm config get userconfig
          npm config get globalconfig
          npm config get always-auth
          npm config list -l
          ls -la ~/.npmrc || true
      - run: npm ci
      - run: npm run test
